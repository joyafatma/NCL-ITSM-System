<!DOCTYPE html>
<html>
<head>
<title>Vendors</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#f4f7fb;
display:flex;
}

.sidebar{
width:250px;
height:100vh;
background:#0f172a;
position:fixed;
color:white;
}

.sidebar h2{
padding:25px;
text-align:center;
}

.sidebar a{
display:block;
padding:15px 25px;
color:white;
text-decoration:none;
}

.sidebar a:hover{
background:#1e293b;
}

.content{
margin-left:250px;
padding:30px;
width:100%;
}

table{
width:100%;
background:white;
border-collapse:collapse;
}

th{
background:#0f172a;
color:white;
padding:15px;
}

td{
padding:15px;
border-bottom:1px solid #ddd;
}

</style>
</head>

<body>

<div class="sidebar">
<h2>ITSM</h2>

<a href="/dashboard/">Dashboard</a>
<a href="/assets/">Assets</a>
<a href="/employees/">Employees</a>
<a href="/vendors/">Vendors</a>

</div>

<div class="content">

<h1>Vendor Management</h1>

<br>

<table>

<tr>
<th>Vendor Name</th>
<th>Contact Person</th>
<th>Phone</th>
<th>Email</th>
</tr>

{% for vendor in vendors %}

<tr>
<td>{{ vendor.vendor_name }}</td>
<td>{{ vendor.contact_person }}</td>
<td>{{ vendor.phone }}</td>
<td>{{ vendor.email }}</td>
</tr>

{% endfor %}

</table>

</div>

</body>
</html>
